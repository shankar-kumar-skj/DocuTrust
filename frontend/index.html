<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocuTrust - Login</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>📄 DocuTrust</h1>
            <p class="subtitle">Enterprise Self-Correcting RAG</p>

            <div class="auth-tabs">
                <button id="loginTab" class="active">Login</button>
                <button id="registerTab">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
                <div id="loginError" class="error-message"></div>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regFullName" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required />
                </div>
                <div class="form-group">
                    <label>Tenant ID</label>
                    <input type="text" id="regTenant" placeholder="my-company" required />
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
                <div id="registerError" class="error-message"></div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
